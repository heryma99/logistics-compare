<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#222}
.wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}
h1{font-size:22px;margin:0 0 4px} .sub{color:#888;font-size:13px;margin-bottom:18px}
.card{background:#fff;border-radius:12px;padding:18px 20px;margin:14px 0;box-shadow:0 1px 4px rgba(0,0,0,.06)}

.concl h2{margin:0 0 8px;font-size:18px} .concl p{margin:6px 0;line-height:1.6;font-size:14px}

table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}

th{background:#f0f3f7;color:#555;font-weight:600} td.zname{text-align:left;font-weight:600;background:#fafbff}

</style></head><body><div class="wrap">
<h1>物流报价环比看板 · price_change_big.html</h1><div class="sub">生成 2026-07-20</div>
<div class='card'><h2>当前有效单价快照</h2><table><thead><tr><th>渠道·分区</th><th>当前(元/KG)</th><th>环比</th></tr></thead><tbody><tr><td class='zname'>德翼CLX-美东</td><td>20.6</td><td>持平</td></tr><tr><td class='zname'>德翼CLX-美中</td><td>19.6</td><td>持平</td></tr><tr><td class='zname'>德翼CLX-美西</td><td>18.2</td><td>持平</td></tr></tbody></table><p class='note'>环比基线取自上次成功运行的 quotes_history/price_snapshot.json；首跑显示『新增』。完整 6 渠道哈希比对见自动化日报。</p></div></div>
<script>
function filterCat(cat){
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('active', b.getAttribute('onclick').indexOf("'"+cat+"'")>=0 || (cat==='all' && b.getAttribute('onclick').indexOf('all')>=0));});
  document.querySelectorAll('tr[data-cat]').forEach(function(tr){
    var cats = (tr.getAttribute('data-cat')||'').split(' ');
    var show = (cat==='all') || cats.indexOf(cat)>=0 || cats.indexOf('普通货')>=0;
    tr.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('td.cat-textile').forEach(function(td){
    td.style.display = (cat==='all' || cat==='普通货') ? 'none' : '';
  });
}
</script>
